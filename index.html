<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الحضور الجامعي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@400;600;700;900&display=swap');
        :root {
            --bg: #0a0e1a; --surface: #111827; --card: #1a2235; --border: #2a3548;
            --accent: #1d6fa4; --gold: #f0a500; --green: #10b981; --text: #f1f5f9; --text-muted: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; direction: rtl; }
        .page { display: none; min-height: 100vh; flex-direction: column; }
        .page.active { display: flex; }
        #page-landing { align-items: center; justify-content: center; padding: 40px 24px; text-align: center; }
        .landing-date-badge { background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 8px 20px; font-size: 14px; color: var(--gold); margin-bottom: 40px; display: inline-block; }
        .land-btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 14px; display: flex; align-items: center; gap: 15px; justify-content: center; }
        .land-btn-student { background: linear-gradient(135deg, var(--gold), #d48f00); color: #0a0e1a; }
        .land-btn-admin { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin: 15px; }
        input { width: 100%; padding: 14px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; color: white; margin-bottom: 15px; text-align: right; outline: none; }
        .group-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .group-item { background: var(--surface); border: 1.5px solid var(--border); padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; color: var(--text-muted); }
        .group-item input { display: none; }
        .group-item:has(input:checked) { border-color: var(--gold); color: var(--gold); background: rgba(240,165,0,0.1); }
        .submit-btn { width: 100%; padding: 18px; background: var(--gold); color: #0a0e1a; border: none; border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="page active" id="page-landing">
    <div class="content-wrap">
        <h2 style="font-size: 16px; opacity: 0.8;">USTO-MB Oran</h2>
        <h1 style="margin: 10px 0;">Computer Science Lab</h1>
        <div class="landing-date-badge" id="landing-date">📅 loading...</div>
        <div style="padding: 0 20px;">
            <button class="land-btn land-btn-student" onclick="goToStudentForm()">📱 Student Attendance</button>
            <button class="land-btn land-btn-admin" onclick="showPage('page-admin-login')">🔐 Teacher’s Area</button>
        </div>
    </div>
</div>

<div class="page" id="page-student">
    <div class="card" id="student-content">
        <h2 style="text-align:center; margin-bottom:20px;">Attendance Registration</h2>
        <label style="display:block; margin-bottom:5px; font-size:12px;">اللقب (Name)</label>
        <input type="text" id="s-nom" placeholder="Ex: BENMOHAMMED">
        <label style="display:block; margin-bottom:5px; font-size:12px;">الاسم (First_name)</label>
        <input type="text" id="s-prenom" placeholder="Ex: Ahmed">
        
        <p style="text-align:center; margin: 15px 0;">Choose your Groupe :</p>
        <div class="group-grid">
            <label class="group-item"><input type="radio" name="groupe" value="G53"> G53</label>
            <label class="group-item"><input type="radio" name="groupe" value="G57"> G57</label>
            <label class="group-item"><input type="radio" name="groupe" value="G71"> G71</label>
            <label class="group-item"><input type="radio" name="groupe" value="G75"> G75</label>
            <label class="group-item"><input type="radio" name="groupe" value="G79"> G79</label>
        </div>
        <button class="submit-btn" id="btn-submit" onclick="submitPresence()" style="margin-top:20px;">تأكيد الحضور ✅</button>
        <p onclick="showPage('page-landing')" style="text-align:center; margin-top:15px; font-size:12px; color:var(--text-muted); cursor:pointer;">← Back</p>
    </div>
</div>

<div class="page" id="page-success" style="text-align:center; justify-content:center;">
    <div style="font-size: 80px;">✅</div>
    <h2 style="color:var(--gold)">Success!</h2>
    <p id="success-msg" style="margin: 20px;"></p>
    <button class="submit-btn" style="width:200px; margin: 0 auto;" onclick="location.reload()">Close</button>
</div>

<div class="page" id="page-admin-login" style="justify-content:center;">
    <div class="card">
        <h2 style="text-align:center; margin-bottom:20px;">🔐 Teacher Login</h2>
        <input type="password" id="admin-pwd" placeholder="Password" style="text-align:center;">
        <button class="submit-btn" onclick="checkAdmin()">Login</button>
        <p onclick="showPage('page-landing')" style="text-align:center; margin-top:15px; font-size:13px; color:var(--text-muted); cursor:pointer;">Cancel</p>
    </div>
</div>

<script>
const SCRIPT_URL = "MET_TA_NOUVELLE_URL_ICI"; 

window.onload = function() {
    const today = new Date();
    document.getElementById('landing-date').innerText = "📅 " + today.toLocaleDateString('ar-DZ', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
    checkStatus();
};

function checkStatus() {
    fetch(SCRIPT_URL)
    .then(r => r.text())
    .then(status => {
        if (status.trim().toUpperCase() !== "OPEN") {
            document.getElementById('student-content').innerHTML = `
                <div style="text-align:center; padding:30px;">
                    <div style="font-size:60px;">🔒</div>
                    <h2 style="color:var(--gold); margin:15px 0;">التسجيل مغلق حاليا</h2>
                    <p>L'enregistrement est fermé. Veuillez attendre l'autorisation.</p>
                    <button class="submit-btn" onclick="location.reload()" style="margin-top:20px; font-size:14px;">Actualiser ↻</button>
                </div>`;
        } else {
            checkIfAlreadyDone();
        }
    });
}

function checkIfAlreadyDone() {
    if (localStorage.getItem('done_' + new Date().toLocaleDateString())) {
        document.getElementById('student-content').innerHTML = `
            <div style="text-align:center; padding:30px;">
                <div style="font-size:60px;">🚫</div>
                <h2 style="color:var(--gold); margin:15px 0;">تم التسجيل سابقا</h2>
                <p>Vous avez déjà enregistré votre présence aujourd'hui.</p>
            </div>`;
    }
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function goToStudentForm() { showPage('page-student'); }

function submitPresence() {
    const nom = document.getElementById('s-nom').value.trim();
    const pre = document.getElementById('s-prenom').value.trim();
    const grp = document.querySelector('input[name="groupe"]:checked');
    const btn = document.getElementById('btn-submit');

    if(!nom || !pre || !grp) return alert("يرجى إدخال جميع المعلومات !");

    btn.style.display = 'none';
    const data = { n: nom, p: pre, g: grp.value, d: new Date().toLocaleDateString(), t: new Date().toLocaleTimeString() };

    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
    .then(() => {
        localStorage.setItem('done_' + new Date().toLocaleDateString(), 'true');
        document.getElementById('success-msg').innerText = "شكراً لك " + pre + "، تم تسجيل حضورك.";
        showPage('page-success');
    })
    .catch(() => {
        alert("خطأ");
        btn.style.display = 'block';
    });
}

function checkAdmin() {
    if(document.getElementById('admin-pwd').value === 'prof2024') {
        showPage('page-landing');
        alert("Accès autorisé");
    } else {
        alert("خطأ");
    }
}
</script>
</body>
</html>
